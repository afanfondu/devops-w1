name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Validate application code
        run: npm run validate

      - name: Security scan
        run: npm audit

      - name: Build docker image
        run: docker build -t devops-app .
